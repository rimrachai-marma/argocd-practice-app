apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: practice-app-prod
  namespace: argocd

  # This finalizer ensures that when the Application is deleted, Argo CD will clean up any resources it created in the cluster.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rimrachai-marma/argocd-practice-app
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    # Prod: manual sync only — you control when it deploys
    syncOptions:
      - CreateNamespace=true
